name: Claude Code PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    concurrency:
      group: claude-review-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Claude Code 代码审查
        uses: anthropics/claude-code-action@11ba60486e4aec9ddfeafcf4bb3f00b028ac2c16 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          max_turns: 15
          direct_prompt: |
            你是一个代码审查专家。请审查此 PR 的变更，并完成以下工作：

            1. **代码质量** — 检查逻辑错误、潜在 bug、边界情况处理
            2. **代码风格** — 是否与项目现有代码风格一致
            3. **安全性** — 是否有安全漏洞（SQL 注入、XSS、敏感信息泄露等）
            4. **性能** — 是否有性能问题
            5. **建议** — 提供具体的改进建议

            请用中文回复，以清晰的列表形式呈现发现的问题和建议。
