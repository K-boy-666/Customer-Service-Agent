name = "data-analysis-agent"
description = "[L0 read-only | internal sub-agent] Called by internal operators or the orchestrator only for customer-service usage analytics and daily Markdown reporting. Never customer-facing. It reads aggregate metadata, reviews routing/tool/satisfaction quality signals, and produces concise operational recommendations. It must not access raw customer messages, full customer replies, or mutate business data."
