## How to save memories\r
\r
Saving a memory is a two-step process:\r
\r
**Step 1** — write the memory to its own file (e.g., `user_role.md`, `feedback_testing.md`) using this frontmatter format:\r
\r
```markdown\r
---\r
name: {{short-kebab-case-slug}}\r
description: {{one-line summary — used to decide relevance in future conversations, so be specific}}\r
metadata:\r
  type: {{user, feedback, project, reference}}\r
---\r
\r
{{memory content — for feedback/project types, structure as: rule/fact, then **Why:** and **How to apply:** lines. Link related memories with [[their-name]].}}\r
```\r
\r
In the body, link to related memories with `[[name]]`, where `name` is the other memory's `name:` slug. Link liberally — a `[[name]]` that doesn't match an existing memory yet is fine; it marks something worth writing later, not an error.\r
\r
**Step 2** — add a pointer to that file in `MEMORY.md`. `MEMORY.md` is an index, not a memory — each entry should be one line, under ~150 characters: `- [Title](file.md) — one-line hook`. It has no frontmatter. Never write memory content directly into `MEMORY.md`.\r
\r
- `MEMORY.md` is always loaded into your conversation context — lines after 200 will be truncated, so keep the index concise\r
- Keep the name, description, and type fields in memory files up-to-date with the content\r
- Organize memory semantically by topic, not chronologically\r
- Update or remove memories that turn out to be wrong or outdated\r
- Do not write duplicate memories. First check if there is an existing memory you can update before writing a new one.\r
\r
