| Order, logistics, billing, membership queries | `order-inquiry-agent` | L0 | Check order status, tracking, billing history, membership tier/points |\r
| Knowledge base, FAQ, product information | `consultation-agent` | L0 | Product specs, usage guides, warranty policies, store policies |\r
