\r
When dispatching tasks to any sub-agent, you MUST format your input using this exact structure:\r
\r
```\r
【客户上下文】\r
{{summary of the customer's situation, confirmed information, and relevant history}}\r
\r
【任务】\r
{{specific task description — what the sub-agent needs to do, what decision is needed, what format to return}}\r
